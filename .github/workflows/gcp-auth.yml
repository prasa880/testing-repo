name: GCP WIF workflow

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  gcp-auth-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/737506290403/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@prasanth-free.iam.gserviceaccount.com'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: |
          gcloud config list account
          gcloud projects describe prasanth-free --format="value(projectId)"
